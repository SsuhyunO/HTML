<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2_layout</title>
    <style>
        /* 초기화 */
        * {
            margin: 0;
            padding: 0;
            font: normal 12 px '돋움';
        }

        ul, ol { list-style: none;}
        a { text-decoration: none; color: #111;}
        input, textarea { outline: none;}

        /* conatiner */
        #container {
            width: 800px;
            height: auto;
            padding: 10px;
            border: 1px solid black;
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* 헤더 */
        header {
            width: 100%;
            height: 120px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        /* 메인 */

        main {
            width: 100%;
            height: auto;
            margin: 10px 0;
            padding: 10px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        main > section {
            width: 100%;
            height: 200px;
            padding: 10px;
            margin: 5px;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        main > section:nth-child(1) {
            margin-bottom: 10px;
        }

        /* 푸터 */
        footer {
            width: 100%;
            height: 100px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }

    </style>
</head>
<body>
    <div id="container">
        <header>header</header>
        <main>
            main
            <section>
                section #1
                <article>article #1</article>
                <article>article #2</article>
            </section>
            <section>
                section #2
                <article>article #1</article>
                <article>article #2</article>
            </section>
        </main>
        <footer>footer</footer>
    </div>
</body>
</html>
